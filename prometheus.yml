global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "alerts.yml"

scrape_configs:
  - job_name: "aasc-api"
    static_configs:
      - targets: ["api:9091"]
    metrics_path: /api/metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
